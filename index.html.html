<title>Snake Game</title>

<link
rel="icon"
type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
<rect width="64" height="64" rx="12" fill="%23111827"/>
<path d="M18 18
C18 10 28 10 28 18
L28 28
C28 36 38 36 38 28
L38 18
C38 10 48 10 48 18
L48 46"
fill="none"
stroke="%2322c55e"
stroke-width="8"
stroke-linecap="round"/>
<circle cx="48" cy="50" r="7" fill="%2322c55e"/>
<circle cx="46" cy="48" r="1.5" fill="white"/>
<circle cx="50" cy="48" r="1.5" fill="white"/>
<path d="M54 52 L60 50 L54 48"
stroke="%23ef4444"
stroke-width="2"
fill="none"
stroke-linecap="round"/>
</svg>'>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#111827;
    font-family:Arial,Helvetica,sans-serif;
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    color:white;
}

.container{
    text-align:center;
}

h1{
    color:#22c55e;
    margin-bottom:15px;
}

.info{

    display:flex;
    justify-content:space-between;

    margin-bottom:10px;

    font-size:18px;
    font-weight:bold;
}

canvas{

    background:#1f2937;

    border:3px solid #22c55e;

    border-radius:12px;

    box-shadow:
    0 0 25px rgba(34,197,94,.35);

}

.tip{

    margin-top:12px;

    opacity:.75;

    font-size:14px;
}

.overlay{

    position:fixed;

    inset:0;

    background:
    rgba(0,0,0,.85);

    display:flex;

    flex-direction:column;

    align-items:center;
    justify-content:center;

    gap:15px;

    z-index:100;
}

.hidden{
    display:none;
}

button{

    border:none;

    background:#22c55e;

    color:white;

    padding:12px 26px;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    font-weight:bold;

    transition:.2s;
}

button:hover{

    background:#16a34a;

    transform:scale(1.05);

}

button:active{

    transform:scale(.98);

}

</style>

</head>

<body>

<div class="container">

<h1>🐍 Snake Game</h1>

<div class="info">

<div>
Pontos:
<span id="score">0</span>
</div>

<div>
Recorde:
<span id="best">0</span>
</div>

</div>

<canvas
id="game"
width="500"
height="500">
</canvas>

<div class="tip">
Use ← ↑ ↓ → para mover
</div>

</div>

<div
id="menu"
class="overlay">

<h1>🐍 Snake Game</h1>

<p>
Coma a comida e evite bater.
</p>

<button onclick="startGame()">
Iniciar
</button>

</div>

<div
id="gameOver"
class="overlay hidden">

<h1>
💀 Game Over
</h1>

<p>

Pontuação:
<span id="finalScore"></span>

</p>

<button onclick="restart()">
Jogar novamente
</button>

</div>

<script>

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const grid = 25;

const tile =
canvas.width / grid;

let snake;

let food;

let dx;

let dy;

let score;

let running=false;

let gameLoop;

const scoreEl =
document.getElementById("score");

const bestEl =
document.getElementById("best");

let best =
localStorage.getItem(
"snake-best"
)||0;

bestEl.textContent=best;

function init(){

snake=[

{x:10,y:10}

];

dx=1;

dy=0;

score=0;

scoreEl.textContent=0;

spawnFood();

}

function spawnFood(){

while(true){

food={

x:Math.floor(
Math.random()*grid
),

y:Math.floor(
Math.random()*grid
)

};

const hit=

snake.some(

part=>

part.x===food.x &&

part.y===food.y

);

if(!hit){

return;

}

}

}

function drawTile(

x,
y,
color

){

ctx.fillStyle=color;

ctx.fillRect(

x*tile+1,

y*tile+1,

tile-2,

tile-2

);

}

function drawFood(){

ctx.fillStyle="#ef4444";

ctx.beginPath();

ctx.arc(

food.x*tile+
tile/2,

food.y*tile+
tile/2,

tile/3,

0,

Math.PI*2

);

ctx.fill();

}

function draw(){

ctx.fillStyle=
"#1f2937";

ctx.fillRect(

0,
0,

canvas.width,

canvas.height

);

drawFood();

snake.forEach(

(part,index)=>{

drawTile(

part.x,

part.y,

index===0

? "#22c55e"

: "#4ade80"

);

}

);

}

function update(){

const head={

x:
snake[0].x+dx,

y:
snake[0].y+dy

};

if(

head.x<0 ||

head.y<0 ||

head.x>=grid ||

head.y>=grid

){

endGame();

return;

}

for(

const part of snake

){

if(

head.x===part.x &&

head.y===part.y

){

endGame();

return;

}

}

snake.unshift(head);

if(

head.x===food.x &&

head.y===food.y

){

score++;

scoreEl.textContent=

score;

if(score>best){

best=score;

localStorage.setItem(

"snake-best",

best

);

bestEl.textContent=

best;

}

spawnFood();

}else{

snake.pop();

}

}

function tick(){

if(!running){

return;

}

update();

draw();

}

function startGame(){

document

.getElementById(
"menu"
)

.classList

.add("hidden");

init();

running=true;

draw();

clearInterval(

gameLoop

);

gameLoop=

setInterval(

tick,

110

);

}

function restart(){

document

.getElementById(
"gameOver"
)

.classList

.add("hidden");

startGame();

}

function endGame(){

running=false;

clearInterval(

gameLoop

);

document

.getElementById(
"finalScore"
)

.textContent=

score;

document

.getElementById(
"gameOver"
)

.classList

.remove(
"hidden"
);

}

document

.addEventListener(

"keydown",

e=>{

if(

!running

){

return;

}

if(

e.key===

"ArrowUp"

&& dy!==1

){

dx=0;

dy=-1;

}

else if(

e.key===

"ArrowDown"

&& dy!==-1

){

dx=0;

dy=1;

}

else if(

e.key===

"ArrowLeft"

&& dx!==1

){

dx=-1;

dy=0;

}

else if(

e.key===

"ArrowRight"

&& dx!==-1

){

dx=1;

dy=0;

}

}

);

draw();

</script>

</body>

</html>
